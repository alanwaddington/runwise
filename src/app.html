<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32x32.png" type="image/png" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" sizes="180x180" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				var stored;
				try {
					stored = localStorage.getItem('theme');
				} catch (e) {
					stored = null;
				}
				var isValidStored = stored === 'light' || stored === 'dark';
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = isValidStored ? stored : prefersDark ? 'dark' : 'light';
				document.documentElement.classList.add(theme);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
